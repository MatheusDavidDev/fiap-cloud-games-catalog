apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalog-db


spec:

  replicas: 1


  selector:

    matchLabels:

      app: catalog-db


  template:

    metadata:

      labels:

        app: catalog-db


    spec:


      containers:

      - name: catalog-db

        image: mcr.microsoft.com/mssql/server:2025-latest


        ports:

        - containerPort: 1433


        env:


        - name: ACCEPT_EULA

          value: "Y"


        - name: MSSQL_PID

          value: "Developer"


        - name: SA_PASSWORD

          valueFrom:

            secretKeyRef:

              name: catalog-secret

              key: SA_PASSWORD



        resources:

          limits:

            memory: "1500Mi"


          requests:

            memory: "1000Mi"



        volumeMounts:

        - name: catalog-storage

          mountPath: /var/opt/mssql



      volumes:

      - name: catalog-storage

        persistentVolumeClaim:

          claimName: catalog-pvc