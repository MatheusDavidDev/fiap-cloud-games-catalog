apiVersion: apps/v1
kind: Deployment

metadata:
  name: catalog-api

spec:
  replicas: 1

  selector:
    matchLabels:
      app: catalog-api

  template:

    metadata:
      labels:
        app: catalog-api

    spec:

      containers:

      - name: catalog-api

        image: catalog-api:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 8080


        resources:

          limits:
            memory: "512Mi"

          requests:
            memory: "256Mi"


        envFrom:

        - configMapRef:
            name: catalog-config

        - secretRef:
            name: catalog-secret